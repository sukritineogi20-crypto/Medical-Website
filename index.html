<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arogya Med and Lab</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #2c7be5;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

nav {
  display: flex;
  justify-content: space-around;
  background: white;
  padding: 10px;
}

nav button {
  padding: 10px;
  border: none;
  background: #2c7be5;
  color: white;
  border-radius: 5px;
}

section {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

.btn {
  background: #28a745;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 5px;
  margin-top: 10px;
}

input {
  padding: 8px;
  width: 100%;
  margin: 5px 0;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>🏥 Arogya Lab and Medicine</header>

<nav>
<button onclick="showSection('Medicine')">Medicines</button>
<button onclick="showSection('Lab')">Lab Tests</button>
</nav>

<!-- MEDICINE -->
<section id="Medicine">
<h2>💊 Medicines</h2>

<div class="card">Paracetamol</div>
<div class="card">Aspirin</div>

<p>Orders handled manually</p>
</section>

<!-- LAB -->
<section id="Lab" class="hidden">

<h2>🧪 Lab Tests</h2>

<label><input type="checkbox" value="200" onchange="calcLab()"> Blood Test ₹200</label><br>
<label><input type="checkbox" value="100" onchange="calcLab()"> Sugar Test ₹100</label><br>
<label><input type="checkbox" value="300" onchange="calcLab()"> Thyroid Test ₹300</label>

<h3>Total: ₹<span id="total">0</span></h3>

<input type="number" id="paid" placeholder="Paid Amount" oninput="calcLab()">

<h3>Remaining: ₹<span id="remaining">0</span></h3>

<input type="text" id="custName" placeholder="Customer Name">

<button class="btn" onclick="bookLab()">Save Record</button>

</section>

<script>

/* Navigation */
function showSection(section) {
  document.getElementById('Medicine').classList.add('hidden');
  document.getElementById('Lab').classList.add('hidden');
  document.getElementById(section).classList.remove('hidden');
}

/* Calculation */
let total = 0;

function calcLab() {
  total = 0;
  let checks = document.querySelectorAll('#lab input[type="checkbox"]:checked');

  checks.forEach(c => total += parseInt(c.value));

  document.getElementById('total').innerText = total;

  let paid = parseInt(document.getElementById('paid').value) || 0;
  document.getElementById('remaining').innerText = total - paid;
}

/* 🔥 CONNECT TO GOOGLE FORM */
let FORM_ID = "FAIpQLScBfRrxES7pWWOiOaNhT49Ut_HJqnz9dVcIPltPrQUd-8yfwQ";

let ENTRY_NAME = "entry.937586831";
let ENTRY_TOTAL = "entry.1995347003";
let ENTRY_PAID = "entry.1632436439";

function bookLab() {

  let name = document.getElementById('custName').value;
  let paid = document.getElementById('paid').value || 0;

  if (!name) {
    alert("Enter customer name");
    return;
  }

  let url = "https://docs.google.com/forms/d/e/" + FORM_ID + "/formResponse?"
    + ENTRY_NAME + "=" + encodeURIComponent(name)
    + "&" + ENTRY_TOTAL + "=" + total
    + "&" + ENTRY_PAID + "=" + paid;

  window.open(url, '_blank');

  alert("Saved to Google Sheet ✅");
}

</script>

</body>
</html>
